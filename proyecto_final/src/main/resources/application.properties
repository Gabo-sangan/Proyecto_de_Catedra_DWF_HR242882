# Base de Datos MySQL (XAMPP puerto 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/tienda_inventario?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/El_Salvador&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Servidor
server.port=8080
spring.application.name=inventario

# JWT
app.jwt.secret=TiendaInventarioSecretKey2026SuperSeguraParaJWTTokenGeneracion
app.jwt.expiration=86400000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS (React Vite dev server)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
